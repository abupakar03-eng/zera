  /* Cinematic dark overlay - matches login screen */
  .bg-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.30) 0%,
      rgba(0,13,26,0.55) 45%,
      rgba(0,0,0,0.92) 100%
    );
    z-index: 1;
  }

  /* Teal glow circle - matches login screen */
  .glow {
    position: fixed;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.10) 0%, transparent 70%);
    z-index: 2;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Logo */
  .logo-wrap {
    width: 72px; height: 72px;
    background: rgba(255,255,255,0.13);
    border: 1.5px solid rgba(255,255,255,0.28);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    backdrop-filter: blur(10px);
    margin-bottom: 16px;
  }

  .brand {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #fff;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.4px;
    margin-bottom: 40px;
  }

  /* Frosted glass card */
  .card {
    width: 100%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 28px;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card-title {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    text-align: center;
  }

  .card-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-top: -10px;
  }

  /* Download buttons */
  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 16px;
    text-decoration: none;
    color: white;
    font-weight: 700;
    font-size: 15px;
    transition: transform 0.15s, opacity 0.15s;
    cursor: pointer;
  }

  .btn:hover { transform: translateY(-2px); opacity: 0.92; }
  .btn:active { transform: scale(0.98); }

  .btn-android {
    background: linear-gradient(135deg, #00B4D8, #0077B6);
    box-shadow: 0 6px 24px rgba(0,180,216,0.35);
  }

  .btn-web {
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.22);
  }

  .btn-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .btn-text { display: flex; flex-direction: column; gap: 2px; }
  .btn-label { font-size: 11px; font-weight: 500; opacity: 0.75; }
  .btn-name { font-size: 16px; font-weight: 800; }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    color: rgba(255,255,255,0.3); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: rgba(255,255,255,0.15);
  }

  /* Features */
  .features {
    display: flex;
    justify-content: space-around;
    margin-top: 4px;
  }
  .feat {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .feat-icon {
    font-size: 20px;
    width: 40px; height: 40px;
    background: rgba(0,229,255,0.10);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .feat-label { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 600; }

  /* Footer */
  .footer {
    margin-top: 24px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
  }

  /* Mobile adjustments */
  @media (max-height: 700px) {
    .tagline { margin-bottom: 24px; }
    .card { padding: 24px 20px; }
  }
</style>
</head>
