<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ZERA · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060910;--s1:#0d1117;--s2:#161b22;--s3:#21262d;--s4:#30363d;
  --txt:#e6edf3;--mut:#7d8590;--mut2:#9198a1;
  --ind:#6e76ff;--ind2:#818cf8;
  --grn:#3fb950;--grn2:#56d364;
  --ora:#d29922;--ora2:#e3b341;
  --red:#f85149;--red2:#ff7b72;
  --pur:#bc8cff;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--mut)}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--s3);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--s3);display:flex;align-items:center;gap:12px;padding:0 20px}
.content{flex:1;overflow-y:auto;padding:24px}
.sb-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--s3)}
.sb-logo-ico{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--ind),var(--grn));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.sb-logo-text{font-size:14px;font-weight:700;letter-spacing:-.2px}
.sb-logo-sub{font-size:10px;color:var(--mut);margin-top:1px}
.sb-section{padding:16px 8px 8px}
.sb-section-label{font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r8);cursor:pointer;color:var(--mut2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:1px solid transparent}
.sb-item:hover{background:var(--s2);color:var(--txt)}
.sb-item.active{background:rgba(110,118,255,.12);color:var(--ind2);border-color:rgba(110,118,255,.2)}
.sb-item-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-item-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--s3);color:var(--mut);padding:1px 6px;border-radius:10px}
.sb-footer{margin-top:auto;padding:12px 8px;border-top:1px solid var(--s3)}
.sb-footer-key{font-size:10px;color:var(--mut);padding:6px 10px;background:var(--s2);border-radius:var(--r8);font-family:monospace;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-settings{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r8);cursor:pointer;color:var(--mut2);font-size:13px;font-weight:500;background:transparent;border:1px solid transparent;transition:all .15s;margin-bottom:4px}
.sb-settings:hover{background:var(--s2);color:var(--txt);border-color:var(--s3)}
.sb-logout{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r8);cursor:pointer;color:var(--red);font-size:13px;font-weight:500;background:transparent;border:1px solid transparent;transition:all .15s}
.sb-logout:hover{background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.2)}
.tb-title{font-size:14px;font-weight:700;flex:1}
.tb-meta{font-size:11px;color:var(--mut)}
.tb-btn{padding:5px 12px;border-radius:var(--r8);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--s4);background:var(--s2);color:var(--txt);transition:all .15s;white-space:nowrap}
.tb-btn:hover{background:var(--s3);border-color:var(--mut)}
.ph{margin-bottom:20px}
.ph h1{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.ph p{color:var(--mut);font-size:13px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--s2);border:1px solid var(--s3);border-radius:var(--r12);padding:16px;position:relative;overflow:hidden;cursor:default;transition:border-color .2s,transform .15s}
.kpi:hover{border-color:var(--s4);transform:translateY(-1px)}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.kpi-icon{font-size:18px;line-height:1}
.kpi-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.badge-up{background:rgba(63,185,80,.15);color:var(--grn2)}
.badge-nt{background:rgba(125,133,144,.12);color:var(--mut2)}
.badge-warn{background:rgba(210,153,34,.15);color:var(--ora2)}
.kpi-val{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-bottom:4px}
.kpi-label{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.kpi-sub{font-size:11px;color:var(--mut)}
.kpi-line{position:absolute;bottom:0;left:0;right:0;height:2px}
.line-ind{background:linear-gradient(90deg,var(--ind),var(--ind2))}
.line-grn{background:linear-gradient(90deg,var(--grn),var(--grn2))}
.line-ora{background:linear-gradient(90deg,var(--ora),var(--ora2))}
.line-red{background:linear-gradient(90deg,var(--red),var(--red2))}
.line-pur{background:linear-gradient(90deg,#8b5cf6,var(--pur))}
.line-mut{background:linear-gradient(90deg,var(--mut),var(--mut2))}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
.card{background:var(--s2);border:1px solid var(--s3);border-radius:var(--r12);padding:20px}
.card-title{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.chart-wrap{position:relative;height:200px}
.act-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--s3)}
.act-row:last-child{border-bottom:none;padding-bottom:0}
.act-lbl{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txt)}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.act-val{font-size:15px;font-weight:700}
.plan-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.plan-lbl{font-size:11px;color:var(--mut);width:48px;font-weight:600}
.plan-track{flex:1;background:var(--s3);border-radius:4px;height:20px;overflow:hidden}
.plan-fill{height:20px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;transition:width .7s ease;min-width:24px}
.pf-grn{background:rgba(63,185,80,.7);color:#000}
.pf-ora{background:rgba(210,153,34,.7);color:#000}
.pf-mut{background:rgba(125,133,144,.2);color:var(--mut2)}
.plan-n{font-size:12px;font-weight:700;min-width:20px;text-align:right;color:var(--txt)}
.perf-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--s3)}
.perf-row:last-child{border-bottom:none;padding-bottom:0}
.perf-lbl{font-size:12px;color:var(--mut2)}
.perf-val{font-size:13px;font-weight:700}
.alert{padding:12px 16px;border-radius:var(--r8);margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;font-size:12px}
.alert-warn{background:rgba(210,153,34,.07);border:1px solid rgba(210,153,34,.2);color:var(--ora2)}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.tbl-wrap{background:var(--s2);border:1px solid var(--s3);border-radius:var(--r12);overflow:hidden;margin-bottom:20px}
.tbl-toolbar{padding:12px 16px;border-bottom:1px solid var(--s3);display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--s2)}
.tbl-input{flex:1;min-width:180px;padding:7px 11px;background:var(--s3);border:1px solid var(--s4);border-radius:var(--r8);color:var(--txt);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.tbl-input:focus{border-color:var(--ind)}
.tbl-select{padding:7px 11px;background:var(--s3);border:1px solid var(--s4);border-radius:var(--r8);color:var(--txt);font-size:12px;font-family:inherit;cursor:pointer;outline:none}
.tbl-select:focus{border-color:var(--ind)}
.tbl-btn{padding:7px 14px;border-radius:var(--r8);font-size:12px;font-weight:600;cursor:pointer;background:var(--ind);color:#fff;border:none;transition:opacity .15s;white-space:nowrap;font-family:inherit}
.tbl-btn:hover{opacity:.85}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
thead{background:var(--s3)}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--s4)}
td{padding:10px 14px;font-size:12px;border-bottom:1px solid var(--s3);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.015)}
.tbl-foot{padding:10px 16px;border-top:1px solid var(--s3);display:flex;align-items:center;justify-content:space-between;background:var(--s2)}
.pg-info{font-size:11px;color:var(--mut)}
.pg-btns{display:flex;gap:5px}
.pg-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:var(--s3);border:1px solid var(--s4);color:var(--txt);font-family:inherit}
.pg-btn:hover:not(:disabled){background:var(--s4)}
.pg-btn:disabled{opacity:.3;cursor:default}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.pl-pro{background:rgba(63,185,80,.12);color:var(--grn2);border:1px solid rgba(63,185,80,.2)}
.pl-tri{background:rgba(210,153,34,.12);color:var(--ora2);border:1px solid rgba(210,153,34,.2)}
.pl-free{background:rgba(125,133,144,.1);color:var(--mut2);border:1px solid var(--s4)}
.pl-on{background:rgba(63,185,80,.1);color:var(--grn);border:1px solid rgba(63,185,80,.15)}
.pl-off{background:rgba(248,81,73,.08);color:var(--red2);border:1px solid rgba(248,81,73,.15)}
.pl-admin{background:rgba(110,118,255,.12);color:var(--ind2);border:1px solid rgba(110,118,255,.2)}
.biz-cell{display:flex;align-items:center;gap:10px}
.biz-ava{width:30px;height:30px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--s4);overflow:hidden}
.biz-ava img{width:100%;height:100%;object-fit:cover}
.biz-name{font-weight:600;font-size:12px;color:var(--txt);margin-bottom:1px}
.biz-email{font-size:10px;color:var(--mut)}
.user-ava{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.pg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.pg-card{background:var(--s2);border:1px solid var(--s3);border-radius:var(--r12);padding:16px;transition:border-color .2s,transform .15s}
.pg-card:hover{border-color:var(--s4);transform:translateY(-1px)}
.pg-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pg-ava{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--ind),var(--pur));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.pg-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-phone{font-size:10px;color:var(--mut)}
.pg-bar-bg{background:var(--s3);border-radius:4px;height:5px;margin-bottom:5px}
.pg-bar-fill{height:5px;border-radius:4px;transition:width .6s ease}
.pg-pct{font-size:11px;color:var(--mut);margin-bottom:8px;font-weight:600}
.pg-tags{display:flex;flex-wrap:wrap;gap:3px}
.ptag{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600}
.ptag-y{background:rgba(63,185,80,.12);color:var(--grn);border:1px solid rgba(63,185,80,.15)}
.ptag-n{background:rgba(248,81,73,.08);color:var(--red2);border:1px solid rgba(248,81,73,.12)}
.sec{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec h2{font-size:14px;font-weight:700}
.sec-r{display:flex;align-items:center;gap:8px}
.chip{font-size:10px;background:var(--s3);color:var(--mut2);padding:3px 9px;border-radius:10px;border:1px solid var(--s4);font-weight:600}
.sl{color:var(--ind2);text-decoration:none;font-size:11px;font-weight:600;padding:3px 7px;border-radius:5px;background:rgba(110,118,255,.1);transition:background .15s}
.sl:hover{background:rgba(110,118,255,.2)}
.exp-soon{color:var(--red2);font-weight:700;font-size:11px}
.exp-ok{color:var(--mut);font-size:11px}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.8}100%{opacity:.4}}
.skel{background:var(--s3);border-radius:4px;animation:shimmer 1.5s ease infinite}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 50%,rgba(110,118,255,.06) 0%,transparent 60%),var(--bg)}
.login-card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r16);padding:40px;width:100%;max-width:380px;box-shadow:0 25px 60px rgba(0,0,0,.6)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-ico{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--ind),var(--grn));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff}
.login-title{font-size:20px;font-weight:800}
.login-sub{font-size:12px;color:var(--mut);margin-top:2px}
.login-label{display:block;font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.login-input{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--s3);border-radius:var(--r8);color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:14px}
.login-input:focus{border-color:var(--ind)}
.login-btn{width:100%;padding:12px;background:var(--ind);color:#fff;border:none;border-radius:var(--r8);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.login-btn:hover{background:var(--ind2)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{display:flex;align-items:center;gap:8px;color:var(--red2);font-size:12px;margin-bottom:10px;padding:10px 12px;background:rgba(248,81,73,.06);border-radius:var(--r8);border:1px solid rgba(248,81,73,.15)}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 16px;border-radius:var(--r8);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);animation:slideIn .3s ease;pointer-events:auto;border:1px solid}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-ok{background:#0d2119;color:var(--grn2);border-color:rgba(63,185,80,.2)}
.toast-err{background:#200e0e;color:var(--red2);border-color:rgba(248,81,73,.2)}
.toast-info{background:#0d1320;color:var(--ind2);border-color:rgba(110,118,255,.2)}
.empty-state{text-align:center;padding:48px 24px;color:var(--mut)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:13px;font-weight:500}
.mono{font-family:'SF Mono',Monaco,monospace;font-size:11px}
.text-muted{color:var(--mut)}
.text-grn{color:var(--grn2)}
.text-ora{color:var(--ora2)}
.text-red{color:var(--red2)}
.text-ind{color:var(--ind2)}
.fw7{font-weight:700}
.divider{border:none;border-top:1px solid var(--s3);margin:16px 0}

/* ── MODAL ──────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r16);padding:28px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.7);animation:fadeUp .2s ease}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:16px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--mut);margin-bottom:22px;line-height:1.6}
.modal-row{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.form-input,.form-select{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--s3);border-radius:var(--r8);color:var(--txt);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus{border-color:var(--ind)}
.form-select{cursor:pointer}
.form-hint{font-size:11px;color:var(--mut);margin-top:5px}
.btn{padding:8px 18px;border-radius:var(--r8);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-cancel{background:var(--s3);color:var(--txt)}.btn-cancel:hover:not(:disabled){background:var(--s4)}
.btn-danger{background:rgba(248,81,73,.12);color:var(--red2);border:1px solid rgba(248,81,73,.25)}.btn-danger:hover:not(:disabled){background:rgba(248,81,73,.22)}
.btn-primary{background:var(--ind);color:#fff}.btn-primary:hover:not(:disabled){background:var(--ind2)}
.btn-success{background:rgba(63,185,80,.12);color:var(--grn2);border:1px solid rgba(63,185,80,.25)}.btn-success:hover:not(:disabled){background:rgba(63,185,80,.22)}

/* ── ACTION BUTTONS ─────────────────── */
.act-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;font-family:inherit;transition:all .15s;white-space:nowrap;line-height:1.4}
.act-btn:disabled{opacity:.4;cursor:not-allowed}
.act-on{background:rgba(63,185,80,.08);color:var(--grn2);border-color:rgba(63,185,80,.2)}.act-on:hover:not(:disabled){background:rgba(63,185,80,.16)}
.act-off{background:rgba(248,81,73,.08);color:var(--red2);border-color:rgba(248,81,73,.2)}.act-off:hover:not(:disabled){background:rgba(248,81,73,.16)}
.act-plan{background:rgba(110,118,255,.08);color:var(--ind2);border-color:rgba(110,118,255,.2)}.act-plan:hover:not(:disabled){background:rgba(110,118,255,.16)}
.act-gap{display:flex;gap:5px;flex-wrap:nowrap}
.act-del{background:rgba(248,81,73,.06);color:var(--red2);border-color:rgba(248,81,73,.18)}.act-del:hover:not(:disabled){background:rgba(248,81,73,.18)}
.del-input{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--s3);border-radius:var(--r8);color:var(--txt);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;margin-top:6px}
.del-input:focus{border-color:var(--red)}
.del-warn{background:rgba(248,81,73,.05);border:1px solid rgba(248,81,73,.2);border-radius:var(--r8);padding:12px 14px;font-size:12px;color:var(--red2);margin-bottom:16px;line-height:1.6}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ──────────────── UTILS ──────────────── */
const BASE = location.origin;
const fmt = n => {
  if (n == null) return '0';
  if (n >= 1e7) return (n/1e7).toFixed(1)+'Cr';
  if (n >= 1e5) return (n/1e5).toFixed(1)+'L';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Number(n).toFixed(0);
};
const fmtDate = iso => {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
};
const fmtDT = iso => {
  if (!iso) return 'Never';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+
         d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
};
const avatarColor = name => {
  const colors=['#6e76ff','#3fb950','#d29922','#f85149','#bc8cff','#58a6ff','#e3b341'];
  let h=0; for(let c of (name||'A')) h=((h<<5)-h)+c.charCodeAt(0);
  return colors[Math.abs(h)%colors.length];
};
const initials = name => (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const expClass = exp => {
  if (!exp) return 'exp-ok';
  const d=(new Date(exp)-new Date())/864e5;
  if (d < 0) return 'exp-soon'; // expired
  return d<7?'exp-soon':'exp-ok';
};
const daysUntilExpiry = exp => {
  if (!exp) return null;
  return Math.floor((new Date(exp) - new Date()) / 864e5);
};
const storeUrl = uuid => `${location.origin}/#/store/${uuid}`;

const apiCall = async (path, method='GET', body=null, adminKey='') => {
  const opts = {
    method,
    headers: { 'X-Admin-Key': adminKey, 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${BASE}/v1/admin${path}`, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || data.message || `HTTP ${r.status}`);
  return data;
};

/* ──────────────── PLAN BADGE ─────────── */
const PlanBadge = ({b}) => {
  if ((b.plan==='PAID'||b.plan==='Paid') && b.subscription_type!=='trial') {
    return <span className="pill pl-pro">PAID</span>;
  }
  return <span className="pill pl-free">FREE</span>;
};

/* ──────────────── TOAST ─────────────── */
const ToastCtx = React.createContext(null);
const ToastProvider = ({children}) => {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg,type='info') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className={`toast toast-${t.type}`}>
            {t.type==='ok'?'✓':t.type==='err'?'✕':'ℹ'} {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
};

/* ──────────────── CONFIRM MODAL ──────── */
const ConfirmModal = ({title, msg, onConfirm, onCancel, danger=false, loading=false}) => (
  <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onCancel();}}>
    <div className="modal">
      <div className="modal-title">{title}</div>
      <div className="modal-sub">{msg}</div>
      <div className="modal-row">
        <button className="btn btn-cancel" onClick={onCancel} disabled={loading}>Cancel</button>
        <button
          className={`btn ${danger?'btn-danger':'btn-primary'}`}
          onClick={onConfirm}
          disabled={loading}
        >
          {loading ? 'Processing…' : 'Confirm'}
        </button>
      </div>
    </div>
  </div>
);

/* ──────────────── PLAN MODAL ──────────── */
const PlanModal = ({biz, onClose, onSaved, adminKey}) => {
  const [plan, setPlan] = useState(biz.plan==='PAID'?'PAID':'FREE');
  const [subType, setSubType] = useState(biz.subscription_type||'monthly');
  const [expiry, setExpiry] = useState(biz.plan_expiry_date||'');
  const [loading, setLoading] = useState(false);
  const toast = React.useContext(ToastCtx);

  const isPaid = plan === 'PAID';

  const suggestExpiry = (type) => {
    const d = new Date();
    if (type==='monthly') d.setMonth(d.getMonth()+1);
    else if (type==='yearly') d.setFullYear(d.getFullYear()+1);
    else d.setDate(d.getDate()+30);
    setExpiry(d.toISOString().slice(0,10));
  };

  const handleSubType = v => { setSubType(v); suggestExpiry(v); };

  useEffect(()=>{
    if(isPaid && !expiry) suggestExpiry(subType);
  },[isPaid]);

  const save = async () => {
    if (isPaid && !expiry) { toast('Please set an expiry date for PAID plan','err'); return; }
    setLoading(true);
    try {
      await apiCall(`/dashboard-businesses/${biz.uuid}/plan`, 'PATCH', {
        plan,
        plan_expiry_date: isPaid ? expiry : null,
        subscription_type: isPaid ? subType : null,
      }, adminKey);
      toast(`Plan updated to ${plan}${isPaid?` (${subType})`:''}`, 'ok');
      onSaved();
    } catch(e) {
      toast(e.message, 'err');
    }
    setLoading(false);
  };

  return (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-title">Change Plan · {biz.business_name}</div>
        <div className="modal-sub">Update subscription plan, type, and expiry date for this business.</div>

        <div className="form-group">
          <label className="form-label">Plan</label>
          <select className="form-select" value={plan} onChange={e=>setPlan(e.target.value)}>
            <option value="FREE">🆓 Free — no subscription</option>
            <option value="PAID">💎 PAID — active subscription</option>
          </select>
        </div>

        {isPaid && (
          <>
            <div className="form-group">
              <label className="form-label">Subscription Type</label>
              <select className="form-select" value={subType} onChange={e=>handleSubType(e.target.value)}>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
                <option value="trial">Trial (30 days)</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Expiry Date</label>
              <input
                type="date"
                className="form-input"
                value={expiry}
                min={new Date().toISOString().slice(0,10)}
                onChange={e=>setExpiry(e.target.value)}
              />
              <div className="form-hint">
                {expiry ? (() => {
                  const d = daysUntilExpiry(expiry);
                  if (d < 0) return <span style={{color:'var(--red2)'}}>⚠ Already expired ({Math.abs(d)} days ago)</span>;
                  return <span style={{color:'var(--grn2)'}}>✓ Expires in {d} day{d!==1?'s':''}</span>;
                })() : 'Select a date'}
              </div>
            </div>
          </>
        )}

        <div style={{padding:'12px 14px',background:'var(--s2)',borderRadius:'var(--r8)',border:'1px solid var(--s3)',fontSize:12,color:'var(--mut)'}}>
          <strong style={{color:'var(--txt)'}}>Current:</strong>&nbsp;
          {biz.plan==='PAID'?(biz.subscription_type==='trial'?'⏳ Trial':'💎 PRO'):'🆓 Free'}
          {biz.plan_expiry_date ? ` · expires ${fmtDate(biz.plan_expiry_date)}` : ''}
        </div>

        <div className="modal-row">
          <button className="btn btn-cancel" onClick={onClose} disabled={loading}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={loading}>
            {loading ? 'Saving…' : 'Update Plan'}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ──────────────── DONUT CHART ─────────── */
const PlanDonut = ({stats}) => {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if(!stats||!ref.current) return;
    const realPaid=(stats.paid_plan_businesses||0)-(stats.trial_plan_businesses||0);
    const realFree=(stats.free_plan_businesses||0)+(stats.trial_plan_businesses||0);
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current.getContext('2d'),{
      type:'doughnut',
      data:{
        labels:['PAID','FREE'],
        datasets:[{
          data:[realPaid,realFree],
          backgroundColor:['rgba(63,185,80,.75)','rgba(125,133,144,.2)'],
          borderColor:['#3fb950','#7d8590'],
          borderWidth:1,hoverOffset:5,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'70%',
        plugins:{
          legend:{position:'bottom',labels:{color:'#7d8590',font:{size:11,family:'Inter'},padding:14,boxWidth:10}},
          tooltip:{callbacks:{label:c=>{
            const pct=stats.total_businesses>0?Math.round(c.raw/stats.total_businesses*100):0;
            return ` ${c.label}: ${c.raw} (${pct}%)`;
          }}}
        }
      }
    });
    return ()=>{if(chartRef.current)chartRef.current.destroy();};
  },[stats]);
  return <div className="chart-wrap"><canvas ref={ref}/></div>;
};

/* ──────────────── KPI CARD ──────────── */
const KPI = ({icon,label,val,sub,line,badge,badgeType='up'}) => (
  <div className="kpi">
    <div className="kpi-top">
      <span className="kpi-icon">{icon}</span>
      {badge && <span className={`kpi-badge badge-${badgeType}`}>{badge}</span>}
    </div>
    <div className="kpi-label">{label}</div>
    <div className="kpi-val">{val}</div>
    {sub && <div className="kpi-sub">{sub}</div>}
    <div className={`kpi-line line-${line}`}/>
  </div>
);

/* ──────────────── SIDEBAR ────────────── */
const NAV = [
  {id:'overview', icon:'⊞', label:'Overview'},
  {id:'businesses', icon:'🏪', label:'Businesses'},
  {id:'users', icon:'👥', label:'Users'},
  {id:'profiles', icon:'✦', label:'Profile Completion'},
];

const Sidebar = ({page, setPage, adminKey, stats, onLogout, onSettings}) => (
  <div className="sidebar">
    <div className="sb-logo">
      <div className="sb-logo-ico">S</div>
      <div>
        <div className="sb-logo-text">ZERA</div>
        <div className="sb-logo-sub">Admin Portal</div>
      </div>
    </div>
    <div className="sb-section">
      <div className="sb-section-label">Navigation</div>
      {NAV.map(n=>(
        <div key={n.id} className={`sb-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
          <span className="sb-item-icon">{n.icon}</span>
          {n.label}
          {n.id==='businesses'&&stats&&<span className="sb-item-badge">{stats.total_businesses}</span>}
          {n.id==='users'&&stats&&<span className="sb-item-badge">{stats.total_users}</span>}
        </div>
      ))}
    </div>
    {stats && (
      <div className="sb-section" style={{marginTop:8}}>
        <div className="sb-section-label">Quick Stats</div>
        <div style={{padding:'0 4px'}}>
          {[
            {label:'Active Today', val:stats.active_users_today, color:'var(--grn)'},
            {label:'Paid Users', val:(stats.paid_plan_businesses||0)-(stats.trial_plan_businesses||0), color:'var(--grn)'},
            {label:'Conversion', val:stats.conversion_rate+'%', color:'var(--ind2)'},
          ].map(r=>(
            <div key={r.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 6px',borderBottom:'1px solid var(--s3)'}}>
              <span style={{fontSize:11,color:'var(--mut)'}}>{r.label}</span>
              <span style={{fontSize:12,fontWeight:700,color:r.color}}>{r.val}</span>
            </div>
          ))}
        </div>
      </div>
    )}
    <div className="sb-footer">
      <div className="sb-footer-key">🔑 {adminKey.slice(0,20)}…</div>
      <button className="sb-settings" onClick={onSettings}>⚙ Change Admin Key</button>
      <button className="sb-logout" onClick={onLogout}><span>→</span> Sign Out</button>
    </div>
  </div>
);

/* ──────────────── CHANGE KEY MODAL ──── */
const ChangeKeyModal = ({adminKey, onClose, onChanged}) => {
  const [newKey, setNewKey] = useState('');
  const [confirm, setConfirm] = useState('');
  const [show, setShow] = useState(false);
  const [loading, setLoading] = useState(false);
  const toast = React.useContext(ToastCtx);

  const valid = newKey.length >= 16 && newKey === confirm;

  const save = async () => {
    if (!valid) return;
    setLoading(true);
    try {
      await apiCall('/dashboard-settings/admin-key', 'PATCH', {new_key: newKey}, adminKey);
      toast('Admin key updated — save it now!', 'ok');
      onChanged(newKey);
      onClose();
    } catch(e) {
      toast(e.message, 'err');
    }
    setLoading(false);
  };

  return (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-title">⚙ Change Admin Key</div>
        <div className="modal-sub">Set a new admin dashboard key. Must be at least 16 characters. Copy and store it safely before saving.</div>

        <div className="form-group">
          <label className="form-label">New Key</label>
          <div style={{display:'flex',gap:6}}>
            <input
              type={show?'text':'password'}
              className="form-input"
              placeholder="Min 16 characters"
              value={newKey}
              onChange={e=>setNewKey(e.target.value)}
              style={{flex:1}}
            />
            <button className="btn btn-cancel" style={{padding:'9px 12px'}} onClick={()=>setShow(s=>!s)}>{show?'🙈':'👁'}</button>
          </div>
          {newKey && newKey.length < 16 && <div className="form-hint text-red">Too short — need at least 16 characters</div>}
        </div>

        <div className="form-group">
          <label className="form-label">Confirm New Key</label>
          <input
            type={show?'text':'password'}
            className="form-input"
            placeholder="Re-enter new key"
            value={confirm}
            onChange={e=>setConfirm(e.target.value)}
          />
          {confirm && confirm !== newKey && <div className="form-hint text-red">Keys do not match</div>}
          {confirm && confirm === newKey && newKey.length >= 16 && <div className="form-hint text-grn">✓ Keys match</div>}
        </div>

        <div style={{background:'rgba(210,153,34,.06)',border:'1px solid rgba(210,153,34,.2)',borderRadius:8,padding:'10px 12px',fontSize:11,color:'var(--ora2)',marginBottom:4}}>
          ⚠ The new key takes effect immediately. You will need to log in again with the new key.
        </div>

        <div className="modal-row">
          <button className="btn btn-cancel" onClick={onClose} disabled={loading}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={!valid||loading}>
            {loading ? 'Saving…' : 'Save New Key'}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ──────────────── DELETE BUSINESS MODAL ── */
const DeleteBusinessModal = ({biz, onClose, onDeleted, adminKey}) => {
  const [typed, setTyped] = useState('');
  const [loading, setLoading] = useState(false);
  const toast = React.useContext(ToastCtx);
  const matches = typed.trim() === biz.business_name.trim();

  const doDelete = async () => {
    if (!matches) return;
    setLoading(true);
    try {
      await apiCall(`/dashboard-businesses/${biz.uuid}`, 'DELETE', null, adminKey);
      toast(`"${biz.business_name}" permanently deleted`, 'ok');
      onDeleted();
    } catch(e) {
      toast(e.message, 'err');
    }
    setLoading(false);
  };

  return (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget&&!loading)onClose();}}>
      <div className="modal" style={{maxWidth:460}}>
        <div className="modal-title" style={{color:'var(--red2)'}}>🗑 Hard Delete Business</div>
        <div className="modal-sub">
          You are about to permanently delete <strong style={{color:'var(--txt)'}}>{biz.business_name}</strong>.
          This will irreversibly remove all products, orders, customers, categories, and the owner account.
        </div>

        <div className="del-warn">
          ⚠ <strong>This cannot be undone.</strong> All data will be wiped from the database permanently.
          <br/>Products: {biz.total_products} &nbsp;·&nbsp; Orders: {biz.total_orders}
        </div>

        <div className="form-group">
          <label className="form-label">Type the business name to confirm</label>
          <div style={{fontSize:12,color:'var(--mut)',marginBottom:6,fontFamily:'monospace',background:'var(--s3)',padding:'4px 8px',borderRadius:6,display:'inline-block'}}>
            {biz.business_name}
          </div>
          <input
            className="del-input"
            placeholder="Type exact business name…"
            value={typed}
            onChange={e=>setTyped(e.target.value)}
            disabled={loading}
            autoFocus
          />
          {typed && !matches && <div className="form-hint text-red">Name does not match</div>}
          {matches && <div className="form-hint text-grn">✓ Confirmed — ready to delete</div>}
        </div>

        <div className="modal-row">
          <button className="btn btn-cancel" onClick={onClose} disabled={loading}>Cancel</button>
          <button
            className="btn btn-danger"
            onClick={doDelete}
            disabled={!matches || loading}
            style={{background:matches?'rgba(248,81,73,.2)':'',borderColor:matches?'rgba(248,81,73,.5)':''}}
          >
            {loading ? 'Deleting…' : '🗑 Permanently Delete'}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ──────────────── OVERVIEW PAGE ─────── */
const OverviewPage = ({data}) => {
  const {stats, businesses=[]} = data;
  const total = stats.total_businesses||1;

  const expiryWarnings = useMemo(()=>
    businesses.filter(b=>{
      if(!b.plan_expiry_date||b.plan!=='PAID') return false;
      const d=(new Date(b.plan_expiry_date)-new Date())/864e5;
      return d>=0&&d<=7;
    })
  ,[businesses]);

  return (
    <>
      <div className="kpi-grid">
        <KPI icon="🏪" label="Total Businesses" val={stats.total_businesses} sub={`${stats.active_businesses} active`} line="ind"
          badge={stats.new_businesses_this_month>0?`+${stats.new_businesses_this_month} month`:null}/>
        <KPI icon="💎" label="Paid Users" val={(stats.paid_plan_businesses||0)-(stats.trial_plan_businesses||0)} sub="Payment completed" line="grn"
          badge={((stats.paid_plan_businesses||0)-(stats.trial_plan_businesses||0))>0?'Active':null}/>
        <KPI icon="🆓" label="Free Users" val={(stats.free_plan_businesses||0)+(stats.trial_plan_businesses||0)} sub="Free / Trial" line="mut"/>
        <KPI icon="🟢" label="Active Today" val={stats.active_users_today} sub="Logged in today" line="grn"
          badge={stats.active_users_today>0?'Live':null}/>
        <KPI icon="📅" label="Active (7 days)" val={stats.active_users_week} sub="Unique logins" line="ind"/>
        <KPI icon="📆" label="Active (30 days)" val={stats.active_users_month} sub="Monthly active" line="ind"/>
        <KPI icon="👤" label="Total Users" val={stats.total_users} sub={`${stats.active_users} active`} line="ind"
          badge={stats.new_users_this_month>0?`+${stats.new_users_this_month}`:null}/>
        <KPI icon="🛒" label="Total Customers" val={stats.total_customers} sub="Across all stores" line="pur"/>
        <KPI icon="📦" label="Total Orders" val={stats.total_orders} sub={`${stats.businesses_with_orders} stores`} line="pur"/>
        <KPI icon="💰" label="Total Revenue" val={`₹${fmt(stats.total_revenue)}`} sub="All paid orders" line="grn"/>
        <KPI icon="📈" label="This Month" val={`₹${fmt(stats.revenue_this_month)}`} sub={`ARPU ₹${fmt(stats.arpu)}`} line="grn"/>
      </div>

      {expiryWarnings.length>0 && (
        <div className="alert alert-warn">
          <span className="alert-icon">⚠</span>
          <div>
            <strong>{expiryWarnings.length} subscription(s) expiring within 7 days: </strong>
            {expiryWarnings.map(b=>(
              <span key={b.uuid} style={{marginRight:8}}>
                {b.business_name} <span className="exp-soon">({fmtDate(b.plan_expiry_date)})</span>
              </span>
            ))}
          </div>
        </div>
      )}

      <div className="g2">
        <div className="card">
          <div className="card-title"><span className="card-title-dot" style={{background:'var(--ind)'}}/>Plan Distribution</div>
          <PlanDonut stats={stats}/>
        </div>
        <div className="card">
          <div className="card-title"><span className="card-title-dot" style={{background:'var(--grn)'}}/>User Activity — Login Tracking</div>
          <div>
            {[
              {label:'Logged in Today',val:stats.active_users_today,color:'var(--grn2)',dot:'#3fb950'},
              {label:'Active This Week',val:stats.active_users_week,color:'var(--ora2)',dot:'#d29922'},
              {label:'Active This Month',val:stats.active_users_month,color:'var(--ind2)',dot:'#6e76ff'},
              {label:'Total Registered',val:stats.total_users,color:'var(--txt)',dot:'#7d8590'},
            ].map(r=>(
              <div key={r.label} className="act-row">
                <span className="act-lbl"><span className="act-dot" style={{background:r.dot}}/>{r.label}</span>
                <span className="act-val" style={{color:r.color}}>{r.val}</span>
              </div>
            ))}
          </div>
          <hr className="divider"/>
          {(()=>{const rp=(stats.paid_plan_businesses||0)-(stats.trial_plan_businesses||0);const rf=(stats.free_plan_businesses||0)+(stats.trial_plan_businesses||0);return[
            {l:'PAID',n:rp,pct:Math.round(rp/total*100),cls:'pf-grn'},
            {l:'FREE',n:rf,pct:Math.round(rf/total*100),cls:'pf-mut'},
          ];})().map(r=>(
            <div key={r.l} className="plan-row">
              <span className="plan-lbl">{r.l}</span>
              <div className="plan-track">
                <div className={`plan-fill ${r.cls}`} style={{width:`${Math.max(r.pct,3)}%`}}>{r.pct}%</div>
              </div>
              <span className="plan-n">{r.n}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="g3">
        {[
          {title:'Engagement',icon:'🎯',color:'#6e76ff',rows:[
            {l:'Stores with Orders',v:`${stats.businesses_with_orders} / ${stats.total_businesses}`},

/* ──────────────── BUSINESSES PAGE ─────── */
const BusinessesPage = ({adminKey}) => {
  const [biz, setBiz] = useState([]);
  const [pag, setPag] = useState({page:1,total_pages:1,total_items:0,page_size:20});
  const [search, setSearch] = useState('');
  const [plan, setPlan] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [page, setPage] = useState(1);
  const [loading, setLoading] = useState(true);
  const [planModal, setPlanModal] = useState(null); // biz object
  const [confirmModal, setConfirmModal] = useState(null); // {biz, action}
  const [deleteModal, setDeleteModal] = useState(null); // biz object
  const [actionLoading, setActionLoading] = useState(false);
  const timer = useRef(null);
  const toast = React.useContext(ToastCtx);

  const load = useCallback(async(pg=1, s=search, p=plan, st=statusFilter)=>{
    setLoading(true);
    const ps = new URLSearchParams({page:pg, page_size:20});
    if(s) ps.set('search', s);
    if(p) ps.set('plan', p);
    if(st==='active') ps.set('is_active', 'true');
    else if(st==='inactive') ps.set('is_active', 'false');
    try {
      const r = await fetch(`${BASE}/v1/admin/dashboard-data?${ps}`, {headers:{'X-Admin-Key':adminKey}});
      const d = await r.json();
      setBiz(d.businesses||[]);
      setPag(d.pagination||{page:1,total_pages:1,total_items:0,page_size:20});
    } catch{}
    setLoading(false);
  },[adminKey, search, plan, statusFilter]);

  useEffect(()=>{load(1);},[]);

  const handleSearch = v => {
    setSearch(v);
    clearTimeout(timer.current);
    timer.current = setTimeout(()=>{setPage(1); load(1, v, plan, statusFilter);}, 400);
  };
  const handlePlan = v => { setPlan(v); setPage(1); load(1, search, v, statusFilter); };
  const handleStatus = v => { setStatusFilter(v); setPage(1); load(1, search, plan, v); };
  const changePg = d => { const n=page+d; if(n<1||n>pag.total_pages) return; setPage(n); load(n); };

  const toggleStatus = async () => {
    if(!confirmModal) return;
    const {b} = confirmModal;
    setActionLoading(true);
    try {
      await apiCall(`/dashboard-businesses/${b.uuid}/status`, 'PATCH', {is_active: !b.is_active}, adminKey);
      toast(`Business ${!b.is_active?'activated':'deactivated'} successfully`, 'ok');
      setConfirmModal(null);
      load(page);
    } catch(e) {
      toast(e.message, 'err');
    }
    setActionLoading(false);
  };

  const exportCSV = () => {
    if(!biz.length){toast('No data to export','err');return;}
    const hdr=['Business','Owner','Phone','Email','Plan','SubType','Expiry','Active','Products','Orders','Revenue','Joined'];
    const rows = biz.map(b=>[
      b.business_name, b.owner_name, b.phone, b.email||'',
      b.plan, b.subscription_type||'', b.plan_expiry_date||'',
      b.is_active?'Yes':'No', b.total_products, b.total_orders, b.total_revenue,
      b.created_at ? new Date(b.created_at).toLocaleDateString('en-IN') : ''
    ]);
    const csv=[hdr,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download=`businesses_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    toast('CSV exported','ok');
  };

  return (
    <>
      {confirmModal && (
        <ConfirmModal
          title={confirmModal.b.is_active ? 'Deactivate Business?' : 'Activate Business?'}
          msg={confirmModal.b.is_active
            ? `This will block "${confirmModal.b.business_name}" from the platform. Their store will go offline and the owner won't be able to login.`
            : `This will restore "${confirmModal.b.business_name}" access to the platform.`
          }
          danger={confirmModal.b.is_active}
          loading={actionLoading}
          onConfirm={toggleStatus}
          onCancel={()=>setConfirmModal(null)}
        />
      )}
      {planModal && (
        <PlanModal
          biz={planModal}
          adminKey={adminKey}
          onClose={()=>setPlanModal(null)}
          onSaved={()=>{ setPlanModal(null); load(page); }}
        />
      )}
      {deleteModal && (
        <DeleteBusinessModal
          biz={deleteModal}
          adminKey={adminKey}
          onClose={()=>setDeleteModal(null)}
          onDeleted={()=>{ setDeleteModal(null); load(1); }}
        />
      )}

      <div className="ph"><h1>Businesses</h1><p>Manage plans, status and subscriptions for all businesses</p></div>
      <div className="tbl-wrap">
        <div className="tbl-toolbar">
          <input className="tbl-input" placeholder="Search name, phone, owner…" value={search} onChange={e=>handleSearch(e.target.value)}/>
          <select className="tbl-select" value={plan} onChange={e=>handlePlan(e.target.value)}>
            <option value="">All Plans</option>
            <option value="FREE">Free</option>
            <option value="PAID">Paid / Trial</option>
          </select>
          <select className="tbl-select" value={statusFilter} onChange={e=>handleStatus(e.target.value)}>
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <button className="tbl-btn" onClick={exportCSV}>⬇ Export CSV</button>
        </div>
        <div className="tbl-scroll">
          <table>
            <thead><tr>
              <th>#</th><th>Business</th><th>Owner</th><th>Phone</th>
              <th>Plan</th><th>Expiry</th><th>Status</th>
              <th>Products</th><th>Orders</th><th>Revenue</th><th>Joined</th><th>Store</th>
              <th>Actions</th>
            </tr></thead>
            <tbody>
              {loading
                ? Array(6).fill(0).map((_,i)=>(
                    <tr key={i}>{Array(13).fill(0).map((__,j)=>(
                      <td key={j}><div className="skel" style={{height:14,width:'80%',borderRadius:4}}/></td>
                    ))}</tr>
                  ))
                : biz.map((b,i)=>{
                  const days = daysUntilExpiry(b.plan_expiry_date);
                  return (
                    <tr key={b.uuid}>
                      <td className="text-muted mono">{(pag.page-1)*pag.page_size+i+1}</td>
                      <td>
                        <div className="biz-cell">
                          <div className="biz-ava">
                            {b.logo_url?<img src={b.logo_url} alt="" onError={e=>e.target.style.display='none'}/>:'🏪'}
                          </div>
                          <div><div className="biz-name">{b.business_name}</div>
                          <div className="biz-email">{b.email||'—'}</div></div>
                        </div>
                      </td>
                      <td>{b.owner_name}</td>
                      <td className="mono">{b.phone}</td>
                      <td><PlanBadge b={b}/></td>
                      <td>
                        {b.plan_expiry_date ? (
                          <span className={expClass(b.plan_expiry_date)}>
                            {fmtDate(b.plan_expiry_date)}
                            {days !== null && days < 0 && <span style={{marginLeft:4,fontSize:10}}>expired</span>}
                            {days !== null && days >= 0 && days <= 7 && <span style={{marginLeft:4,fontSize:10}}>({days}d left)</span>}
                          </span>
                        ) : '—'}
                      </td>
                      <td><span className={`pill ${b.is_active?'pl-on':'pl-off'}`}>{b.is_active?'● Active':'○ Inactive'}</span></td>
                      <td className="fw7">{b.total_products}</td>
                      <td className="fw7">{b.total_orders}</td>
                      <td className="fw7 text-grn">₹{fmt(b.total_revenue)}</td>
                      <td className="text-muted">{fmtDate(b.created_at)}</td>
                      <td><a className="sl" href={storeUrl(b.uuid)} target="_blank">↗</a></td>
                      <td>
                        <div className="act-gap">
                          <button
                            className={`act-btn ${b.is_active?'act-off':'act-on'}`}
                            onClick={()=>setConfirmModal({b})}
                          >
                            {b.is_active ? 'Deactivate' : 'Activate'}
                          </button>
                          <button
                            className="act-btn act-plan"
                            onClick={()=>setPlanModal(b)}
                          >
                            Plan
                          </button>
                          <button
                            className="act-btn act-del"
                            onClick={()=>setDeleteModal(b)}
                            title="Permanently delete this business"
                          >
                            🗑
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })
              }
              {!loading&&!biz.length&&(
                <tr><td colSpan={13}><div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-text">No businesses found</div></div></td></tr>
              )}
            </tbody>
          </table>
        </div>
        {pag.total_pages>1&&(
          <div className="tbl-foot">
            <span className="pg-info">Page {pag.page} of {pag.total_pages} — {pag.total_items} total</span>
            <div className="pg-btns">
              <button className="pg-btn" onClick={()=>changePg(-1)} disabled={pag.page<=1}>← Prev</button>
              <button className="pg-btn" onClick={()=>changePg(1)} disabled={pag.page>=pag.total_pages}>Next →</button>
            </div>
          </div>
        )}
      </div>
    </>
  );
};

/* ──────────────── PROFILES PAGE ──────── */
const ProfilesPage = ({businesses=[]}) => {
  const [sort, setSort] = useState('asc');
  const fields = b => [
    ['Logo', !!b.logo_url],['Email', !!b.email],
    ['Address', !!b.address],['City', !!b.city],
    ['GSTIN', !!b.gstin],['PRO Plan', b.plan==='PAID'],
  ];
  const pct = b => {
    const f=fields(b);
    return Math.round(f.filter(x=>x[1]).length/f.length*100);
  };
  const sorted = useMemo(()=>
    [...businesses].sort((a,b)=>sort==='asc'?pct(a)-pct(b):pct(b)-pct(a))
  ,[businesses,sort]);

  const avg = businesses.length ? Math.round(businesses.reduce((s,b)=>s+pct(b),0)/businesses.length) : 0;
  const complete = businesses.filter(b=>pct(b)===100).length;

  return (
    <>
      <div className="ph"><h1>Profile Completion</h1><p>How complete each business profile is</p></div>
      <div className="g3" style={{marginBottom:20}}>
        {[
          {label:'Avg Completion',val:`${avg}%`,icon:'📊',color:'var(--ind2)'},
          {label:'Fully Complete',val:complete,icon:'✅',color:'var(--grn2)'},
          {label:'Need Attention',val:businesses.filter(b=>pct(b)<50).length,icon:'⚠',color:'var(--ora2)'},
        ].map(c=>(
          <div key={c.label} className="card" style={{textAlign:'center',padding:'20px 16px'}}>
            <div style={{fontSize:28,marginBottom:8}}>{c.icon}</div>
            <div style={{fontSize:22,fontWeight:800,color:c.color,marginBottom:4}}>{c.val}</div>
            <div style={{fontSize:11,color:'var(--mut)',fontWeight:600,textTransform:'uppercase',letterSpacing:.4}}>{c.label}</div>
          </div>
        ))}
      </div>
      <div className="sec">
        <h2>All Businesses ({businesses.length})</h2>
        <select className="tbl-select" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="asc">Least Complete First</option>
          <option value="desc">Most Complete First</option>
        </select>
      </div>
      <div className="pg-grid">
        {sorted.map(b=>{
          const p=pct(b);
          const col=p>=80?'#3fb950':p>=50?'#d29922':'#f85149';
          return (
            <div key={b.uuid} className="pg-card">
              <div className="pg-head">
                <div className="pg-ava">{initials(b.business_name)}</div>
                <div style={{minWidth:0}}>
                  <div className="pg-name" title={b.business_name}>{b.business_name}</div>
                  <div className="pg-phone">{b.phone}</div>
                </div>
              </div>
              <div className="pg-bar-bg">
                <div className="pg-bar-fill" style={{width:`${p}%`,background:col}}/>
              </div>
              <div className="pg-pct">{p}% complete · <PlanBadge b={b}/></div>
              <div className="pg-tags">
                {fields(b).map(([n,y])=>(
                  <span key={n} className={`ptag ${y?'ptag-y':'ptag-n'}`}>{y?'✓':'+1'} {n}</span>
                ))}
              </div>
            </div>
          );
        })}
        {!sorted.length&&(
          <div className="empty-state"><div className="empty-icon">✦</div><div className="empty-text">No data</div></div>
        )}
      </div>
    </>
  );
};

/* ──────────────── LOGIN PAGE ──────────── */
const LoginPage = ({onLogin}) => {
  const [key, setKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const doLogin = async () => {
    if (!key.trim()) return;
    setLoading(true); setErr('');
    try {
      const r = await fetch(`${BASE}/v1/admin/dashboard-data`, {headers:{'X-Admin-Key':key.trim()}});
      if (!r.ok) throw new Error('Invalid admin key');
      const d = await r.json();
      sessionStorage.setItem('sl_ak', key.trim());
      onLogin(key.trim(), d);
    } catch(e) {
      setErr(e.message||'Something went wrong');
    }
    setLoading(false);
  };

  return (
    <div className="login-bg">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-ico">S</div>
          <div>
            <div className="login-title">ZERA</div>
            <div className="login-sub">Platform Administration</div>
          </div>
        </div>
        <label className="login-label">Admin Key</label>
        <input
          className="login-input" type="password"
          placeholder="Enter your admin key…"
          value={key} onChange={e=>setKey(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&doLogin()}
          autoFocus
        />
        {err && <div className="login-err">✕ {err}</div>}
        <button className="login-btn" onClick={doLogin} disabled={loading||!key.trim()}>
          {loading ? 'Signing in…' : 'Sign In →'}
        </button>
        <div style={{marginTop:16,fontSize:11,color:'var(--mut)',textAlign:'center'}}>
          ZERA Admin Portal · Protected Access
        </div>
      </div>
    </div>
  );
};

/* ──────────────── ROOT APP ────────────── */
const App = () => {
  const [adminKey, setAdminKey] = useState('');
  const [data, setData] = useState(null);
  const [page, setPage] = useState('overview');
  const [countdown, setCountdown] = useState(300);
  const cdRef = useRef(null);
  const toast = React.useContext(ToastCtx);

  const loadData = useCallback(async(k=adminKey)=>{
    if(!k) return;
    try {
      const r = await fetch(`${BASE}/v1/admin/dashboard-data?page=1&page_size=20`, {headers:{'X-Admin-Key':k}});
      if(!r.ok){logout();return;}
      const d = await r.json();
      setData(d);
    } catch{}
  },[adminKey]);

  const startCountdown = useCallback(()=>{
    clearInterval(cdRef.current);
    setCountdown(300);
    cdRef.current = setInterval(()=>{
      setCountdown(c=>{
        if(c<=1){loadData();return 300;}
        return c-1;
      });
    },1000);
  },[loadData]);

  const [showKeyModal, setShowKeyModal] = useState(false);

  const onLogin = (k,d) => { setAdminKey(k); setData(d); startCountdown(); };
  const logout = () => {
    sessionStorage.removeItem('sl_ak');
    setAdminKey(''); setData(null);
    clearInterval(cdRef.current);
  };
  const onKeyChanged = (newKey) => {
    sessionStorage.setItem('sl_ak', newKey);
    setAdminKey(newKey);
  };

  useEffect(()=>{
    const saved = sessionStorage.getItem('sl_ak');
    if(saved){
      setAdminKey(saved);
      fetch(`${BASE}/v1/admin/dashboard-data?page=1&page_size=20`, {headers:{'X-Admin-Key':saved}})
        .then(r=>r.ok?r.json():Promise.reject())
        .then(d=>{setData(d); startCountdown();})
        .catch(()=>sessionStorage.removeItem('sl_ak'));
    }
  },[]);

  useEffect(()=>{
    if(adminKey&&data) startCountdown();
    return ()=>clearInterval(cdRef.current);
  },[adminKey]);

  const manualRefresh = async () => {
    await loadData();
    startCountdown();
    toast('Dashboard refreshed','ok');
  };

  if(!adminKey||!data) return <LoginPage onLogin={onLogin}/>;

  const PAGE_TITLES = {overview:'Overview',businesses:'Businesses',users:'Users',profiles:'Profile Completion'};

  return (
    <div className="layout">
      <Sidebar page={page} setPage={setPage} adminKey={adminKey} stats={data.stats} onLogout={logout} onSettings={()=>setShowKeyModal(true)}/>
      {showKeyModal && <ChangeKeyModal adminKey={adminKey} onClose={()=>setShowKeyModal(false)} onChanged={onKeyChanged}/>}
      <div className="main">
        <div className="topbar">
          <span className="tb-title">{PAGE_TITLES[page]}</span>
          <span className="tb-meta">Auto-refresh in {countdown}s</span>
          <span className="tb-meta">{new Date().toLocaleTimeString()}</span>
          <button className="tb-btn" onClick={manualRefresh}>↻ Refresh</button>
        </div>
        <div className="content">
          {page==='overview'   && <OverviewPage data={data}/>}
          {page==='businesses' && <BusinessesPage adminKey={adminKey}/>}
          {page==='users'      && <UsersPage adminKey={adminKey}/>}
          {page==='profiles'   && <ProfilesPage businesses={data.businesses||[]}/>}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App/></ToastProvider>
);
</script>
</body>
</html>
