<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shop directly from local stores. Easy ordering, real-time updates, and direct delivery.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZERA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ZERA | Your Business. Online</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // For customer store pages, override the PWA manifest so the installed
    // shortcut opens directly to the store, not the business-owner root.
    (function () {
      var path = window.location.pathname;
      if (/^\/store\//.test(path)) {
        var storeManifest = {
          name: "ZERA Customer Store",
          short_name: "Store",
          start_url: path,
          scope: "/store/",
          display: "standalone",
          background_color: "#08091A",
          theme_color: "#FF6F00",
          description: "Shop directly from your favorite local stores with ZERA.",
          orientation: "portrait-primary",
          prefer_related_applications: false,
          icons: [
            { src: "icons/Icon-192.png", sizes: "192x192", type: "image/png" },
            { src: "icons/Icon-512.png", sizes: "512x512", type: "image/png" },
            { src: "icons/Icon-maskable-192.png", sizes: "192x192", type: "image/png", purpose: "maskable" },
            { src: "icons/Icon-maskable-512.png", sizes: "512x512", type: "image/png", purpose: "maskable" }
          ]
        };
        var blob = new Blob([JSON.stringify(storeManifest)], { type: "application/manifest+json" });
        var manifestLink = document.querySelector('link[rel="manifest"]');
        if (manifestLink) {
          manifestLink.setAttribute("href", URL.createObjectURL(blob));
        }
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
