name: storelink
description: Indian MSME Business Management SaaS Platform
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  go_router: ^13.0.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  file_picker: 11.0.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  path_provider: ^2.1.2
  web: ^1.1.0
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  share_plus: ^10.1.2
  url_launcher: ^6.3.1
  web_socket_channel: ^3.0.1
  qr_flutter: ^4.1.0
  path: ^1.9.0
  crypto: ^3.0.3
  uuid: ^4.3.3
  shared_preferences: ^2.5.5
  local_auth: ^2.3.0
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/login_bg.jpg
    - assets/images/holographic_product.png
    - assets/images/payment_success.png
